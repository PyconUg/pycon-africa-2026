{# Material Symbols — add/remove circle with Alpine crossfade + scale on expand/collapse #}
<span class="venue-accordion-toggle-icon relative inline-flex h-14 w-14 shrink-0 items-center justify-center text-[#091130]" aria-hidden="true">
  <span
    class="absolute inset-0 flex items-center justify-center"
    x-show="openId !== '{{ section_key }}'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-75"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-75"
  >
    <span class="material-symbols-outlined leading-none">add_circle</span>
  </span>
  <span
    class="absolute inset-0 flex items-center justify-center"
    x-show="openId === '{{ section_key }}'"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 scale-75"
    x-transition:enter-end="opacity-100 scale-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 scale-100"
    x-transition:leave-end="opacity-0 scale-75"
  >
    <span class="material-symbols-outlined leading-none">remove_circle</span>
  </span>
</span>
