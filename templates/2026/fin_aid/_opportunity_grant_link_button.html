{% load i18n %}
<a
  href="{{ href }}"
  class="{{ btn_class }} inline-flex items-center justify-center gap-2 rounded-lg transition-colors"
  x-data="{ loading: false }"
  @click="loading = true"
  :class="loading ? 'opacity-70 pointer-events-none cursor-wait' : ''"
>
  <svg x-show="loading" width="20" height="20" class="h-5 w-5 flex-none animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
  </svg>
  <span x-show="!loading">{{ label }}</span>
  <span x-show="loading">{% trans "Loading…" %}</span>
</a>
