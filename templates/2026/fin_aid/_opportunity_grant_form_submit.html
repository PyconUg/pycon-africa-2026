{% load i18n %}
<button
  type="submit"
  class="mt-4 inline-flex w-full sm:w-auto items-center justify-center gap-2 cursor-pointer rounded-lg bg-pycon-teal px-6 py-3 font-semibold text-white border-0 transition hover:bg-teal-700 disabled:opacity-70 disabled:cursor-not-allowed"
  :disabled="loading"
  :aria-busy="loading.toString()"
>
  <svg x-show="loading" width="20" height="20" class="h-5 w-5 flex-none animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
  </svg>
  <span x-show="!loading">{{ idle_label }}</span>
  <span x-show="loading">{{ busy_label }}</span>
</button>
